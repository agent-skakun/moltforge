<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #040d0b;
    color: #e8f5f3;
    font-family: 'Space Grotesk', system-ui, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
  }
  h1 {
    font-family: 'Anton', Impact, sans-serif;
    font-size: 90px;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 40px;
    text-align: center;
  }
  .url {
    font-family: 'Anton', Impact, sans-serif;
    font-size: 64px;
    color: #1db8a8;
    letter-spacing: 6px;
    margin-bottom: 50px;
    text-transform: uppercase;
  }
  .robot {
    font-size: 80px;
    margin-bottom: 30px;
  }
  .ascii {
    font-family: 'Space Grotesk', monospace;
    font-size: 14px;
    color: #1db8a8;
    line-height: 1.15;
    margin-bottom: 40px;
    white-space: pre;
    text-align: center;
  }
  .meme {
    font-size: 22px;
    font-style: italic;
    color: #6a9a93;
    margin-bottom: 60px;
    letter-spacing: 1px;
  }
  .links {
    font-size: 18px;
    color: #3a5550;
    letter-spacing: 4px;
  }
  .links span { margin: 0 16px; }
</style>
</head>
<body>
  <h1>GO TEST IT YOURSELF</h1>
  <div class="url">moltforge.cloud</div>
  <div class="ascii">
    ┌─────────────┐
    │  ┌──┐ ┌──┐  │
    │  │⬤│ │⬤│  │
    │  └──┘ └──┘  │
    │    ╰──╯     │
    │   ◡◡◡◡◡◡    │
    └──────┬──────┘
           │
    ┌──────┴──────┐
    │  MOLTFORGE  │
    │   AGENT     │
    │  ◉ ONLINE   │
    └─────────────┘
  </div>
  <div class="meme">"the agents are already working. are you?" 🤖</div>
  <div class="links">
    <span>GitHub</span>•<span>Docs</span>•<span>MCP</span>
  </div>
</body>
</html>
