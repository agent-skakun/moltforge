<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 160" shape-rendering="crispEdges">
  <!-- MoltForge Logo — Final approved version -->
  <!-- Pixel unit: 5px. Lobster sprite + clean diamond plumbob (no stem) -->

  <!-- PLUMBOB diamond (no stem), centered above lobster -->
  <!-- 2px unit, 11 rows, viewBox offset to center over sprite -->
  <g transform="translate(54, 0)">
    <rect x="10" y="0"  width="2" height="2" fill="#5aef7a"/>
    <rect x="8"  y="2"  width="6" height="2" fill="#4ad870"/>
    <rect x="6"  y="4"  width="10" height="2" fill="#3ec95a"/>
    <rect x="4"  y="6"  width="14" height="2" fill="#3ec95a"/>
    <rect x="2"  y="8"  width="18" height="2" fill="#3ec95a"/>
    <rect x="0"  y="10" width="22" height="2" fill="#4ad86a"/>
    <rect x="2"  y="12" width="18" height="2" fill="#22a040"/>
    <rect x="4"  y="14" width="14" height="2" fill="#1a8032"/>
    <rect x="6"  y="16" width="10" height="2" fill="#1a8032"/>
    <rect x="8"  y="18" width="6"  height="2" fill="#145a28"/>
    <rect x="10" y="20" width="2"  height="2" fill="#0e3a14"/>
    <!-- shine -->
    <rect x="8"  y="2"  width="2"  height="2" fill="#b0ffc0" opacity=".65"/>
    <rect x="6"  y="4"  width="4"  height="2" fill="#90f0a0" opacity=".3"/>
  </g>

  <!-- LOBSTER SPRITE, offset y=26 to sit below plumbob -->
  <g transform="translate(0, 26)">
    <!-- ANTENNAE -->
    <rect x="35" y="5"  width="5" height="5" fill="#ff4040"/>
    <rect x="40" y="10" width="5" height="5" fill="#c02020"/>
    <rect x="45" y="15" width="5" height="5" fill="#c02020"/>
    <rect x="75" y="5"  width="5" height="5" fill="#ff4040"/>
    <rect x="70" y="10" width="5" height="5" fill="#c02020"/>
    <rect x="65" y="15" width="5" height="5" fill="#c02020"/>
    <!-- HEAD row 1 -->
    <rect x="45" y="20" width="5" height="5" fill="#e63030"/>
    <rect x="50" y="20" width="5" height="5" fill="#e63030"/>
    <rect x="55" y="20" width="5" height="5" fill="#e63030"/>
    <rect x="60" y="20" width="5" height="5" fill="#e63030"/>
    <rect x="65" y="20" width="5" height="5" fill="#e63030"/>
    <rect x="70" y="20" width="5" height="5" fill="#e63030"/>
    <!-- HEAD row 2 — eyes -->
    <rect x="40" y="25" width="5" height="5" fill="#e63030"/>
    <rect x="45" y="25" width="5" height="5" fill="#ffffff"/>
    <rect x="50" y="25" width="5" height="5" fill="#ffffff"/>
    <rect x="55" y="25" width="5" height="5" fill="#e63030"/>
    <rect x="60" y="25" width="5" height="5" fill="#e63030"/>
    <rect x="65" y="25" width="5" height="5" fill="#ffffff"/>
    <rect x="70" y="25" width="5" height="5" fill="#ffffff"/>
    <rect x="75" y="25" width="5" height="5" fill="#e63030"/>
    <!-- HEAD row 3 — pupils -->
    <rect x="40" y="30" width="5" height="5" fill="#e63030"/>
    <rect x="45" y="30" width="5" height="5" fill="#ffffff"/>
    <rect x="50" y="30" width="5" height="5" fill="#111111"/>
    <rect x="55" y="30" width="5" height="5" fill="#e63030"/>
    <rect x="60" y="30" width="5" height="5" fill="#e63030"/>
    <rect x="65" y="30" width="5" height="5" fill="#111111"/>
    <rect x="70" y="30" width="5" height="5" fill="#ffffff"/>
    <rect x="75" y="30" width="5" height="5" fill="#e63030"/>
    <!-- HEAD row 4 -->
    <rect x="40" y="35" width="45" height="5" fill="#e63030"/>
    <!-- BODY rows -->
    <rect x="40" y="40" width="45" height="5" fill="#e63030"/>
    <rect x="35" y="45" width="55" height="5" fill="#e63030"/>
    <rect x="40" y="45" width="25" height="5" fill="#f04040" opacity=".5"/>
    <rect x="35" y="50" width="55" height="2" fill="#c02020"/>
    <rect x="35" y="50" width="55" height="5" fill="#e63030"/>
    <rect x="35" y="55" width="55" height="5" fill="#e63030"/>
    <rect x="35" y="60" width="55" height="2" fill="#c02020"/>
    <rect x="35" y="60" width="55" height="5" fill="#e63030"/>
    <rect x="35" y="65" width="55" height="5" fill="#e63030"/>
    <rect x="35" y="70" width="55" height="5" fill="#e63030"/>
    <!-- LEFT CLAW -->
    <rect x="10" y="45" width="5"  height="5" fill="#e63030"/>
    <rect x="15" y="45" width="5"  height="5" fill="#e63030"/>
    <rect x="10" y="50" width="5"  height="5" fill="#e63030"/>
    <rect x="15" y="50" width="10" height="5" fill="#e63030"/>
    <rect x="20" y="50" width="5"  height="5" fill="#e63030"/>
    <rect x="25" y="50" width="10" height="5" fill="#e63030"/>
    <rect x="10" y="55" width="30" height="5" fill="#e63030"/>
    <rect x="10" y="60" width="25" height="5" fill="#e63030"/>
    <rect x="10" y="65" width="20" height="5" fill="#c02020"/>
    <!-- RIGHT CLAW -->
    <rect x="110" y="45" width="5"  height="5" fill="#e63030"/>
    <rect x="105" y="45" width="5"  height="5" fill="#e63030"/>
    <rect x="110" y="50" width="5"  height="5" fill="#e63030"/>
    <rect x="95"  y="50" width="15" height="5" fill="#e63030"/>
    <rect x="95"  y="55" width="25" height="5" fill="#e63030"/>
    <rect x="95"  y="60" width="25" height="5" fill="#e63030"/>
    <rect x="100" y="65" width="20" height="5" fill="#c02020"/>
    <!-- HAMMER -->
    <rect x="105" y="15" width="5"  height="20" fill="#7a4a28"/>
    <rect x="95"  y="10" width="25" height="10" fill="#555555"/>
    <rect x="95"  y="10" width="25" height="4"  fill="#888888" opacity=".5"/>
    <!-- sparks -->
    <rect x="90" y="60" width="5" height="5" fill="#f07828"/>
    <rect x="85" y="65" width="5" height="5" fill="#f07828" opacity=".7"/>
    <rect x="95" y="65" width="5" height="5" fill="#f5a060" opacity=".6"/>
    <!-- LEGS -->
    <rect x="40" y="75" width="5" height="5" fill="#c02020"/>
    <rect x="35" y="80" width="5" height="5" fill="#c02020"/>
    <rect x="30" y="85" width="5" height="5" fill="#c02020"/>
    <rect x="50" y="75" width="5" height="5" fill="#c02020"/>
    <rect x="45" y="80" width="5" height="5" fill="#c02020"/>
    <rect x="75" y="75" width="5" height="5" fill="#c02020"/>
    <rect x="80" y="80" width="5" height="5" fill="#c02020"/>
    <rect x="85" y="85" width="5" height="5" fill="#c02020"/>
    <rect x="65" y="75" width="5" height="5" fill="#c02020"/>
    <rect x="70" y="80" width="5" height="5" fill="#c02020"/>
    <!-- TAIL -->
    <rect x="45" y="75" width="45" height="5" fill="#e63030"/>
    <rect x="40" y="80" width="5"  height="5" fill="#c02020"/>
    <rect x="50" y="80" width="5"  height="5" fill="#c02020"/>
    <rect x="55" y="80" width="5"  height="5" fill="#c02020"/>
    <rect x="60" y="80" width="5"  height="5" fill="#c02020"/>
    <rect x="65" y="80" width="5"  height="5" fill="#c02020"/>
    <rect x="70" y="80" width="5"  height="5" fill="#c02020"/>
    <rect x="75" y="80" width="5"  height="5" fill="#c02020"/>
    <rect x="80" y="80" width="5"  height="5" fill="#c02020"/>
  </g>
</svg>
