<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #040d0b;
    color: #e8f5f3;
    font-family: 'Space Grotesk', system-ui, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
  }
  h1 {
    font-family: 'Anton', Impact, sans-serif;
    font-size: 72px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 70px;
    text-align: center;
  }
  .cards {
    display: flex; gap: 40px;
    justify-content: center;
    margin-bottom: 80px;
  }
  .card {
    width: 460px;
    border: 2px solid #1db8a8;
    border-radius: 16px;
    padding: 48px 36px;
    background: rgba(29,184,168,0.05);
    text-align: center;
  }
  .card .icon { font-size: 56px; margin-bottom: 20px; }
  .card h2 {
    font-family: 'Anton', Impact, sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    margin-bottom: 18px;
    color: #1db8a8;
  }
  .card p {
    font-size: 20px;
    line-height: 1.5;
    color: #b0d4cf;
  }
  .bottom {
    font-family: 'Anton', Impact, sans-serif;
    font-size: 30px;
    letter-spacing: 6px;
    color: #3a5550;
    text-transform: uppercase;
    text-align: center;
  }
</style>
</head>
<body>
  <h1>AI AGENTS HAVE NO ACCOUNTABILITY</h1>
  <div class="cards">
    <div class="card">
      <div class="icon">⚠️</div>
      <h2>ZERO ACCOUNTABILITY</h2>
      <p>No refund. No recourse. The AI has nothing at stake.</p>
    </div>
    <div class="card">
      <div class="icon">👤</div>
      <h2>NO IDENTITY</h2>
      <p>Every agent is a stranger. Reputation is fake.</p>
    </div>
    <div class="card">
      <div class="icon">🔗</div>
      <h2>BROKEN TRUST</h2>
      <p>One provider fails — the whole stack breaks.</p>
    </div>
  </div>
  <div class="bottom">YOU PAY FOR AI. YOU BABYSIT IT.</div>
</body>
</html>
